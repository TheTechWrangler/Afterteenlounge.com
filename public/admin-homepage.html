<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homepage Editor</title>
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>

  <div class="admin-wrap">

    <h1>Homepage Editor</h1>

    <div style="margin-bottom:20px;">
      <a class="btn btn-secondary" href="/admin">← Back</a>
    </div>

    <form method="POST" action="/admin/homepage/save">

      <h2>Hero</h2>

      <input name="heroHeading" placeholder="Hero Heading" />
      <input name="heroText" placeholder="Hero Text" />

      <h2>Buttons</h2>

      <input name="primaryButtonText" placeholder="Primary Button Text" />
      <input name="secondaryButtonText" placeholder="Secondary Button Text" />

      <h2>Feature Panel</h2>

      <input name="featureTitle" placeholder="Feature Title" />
      <input name="featureText" placeholder="Feature Text" />

      <input name="featureItemOneTime" placeholder="Item One Time" />
      <input name="featureItemOneText" placeholder="Item One Text" />

      <input name="featureItemTwoTime" placeholder="Item Two Time" />
      <input name="featureItemTwoText" placeholder="Item Two Text" />

      <br><br>
      <button class="btn btn-primary" type="submit">Save</button>

    </form>

  </div>

  <script>
    async function loadHomepageData() {
      const res = await fetch('/api/homepage');
      const data = await res.json();

      Object.keys(data).forEach(key => {
        const el = document.querySelector(`[name="${key}"]`);
        if (el) el.value = data[key];
      });
    }

    loadHomepageData();
  </script>

</body>
</html>
